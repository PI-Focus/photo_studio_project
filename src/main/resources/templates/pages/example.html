<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Данные контекста</title>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; margin: 2rem; line-height: 1.5; }
        h1 { margin-bottom: 1.5rem; }
        .block { margin-bottom: 1.5rem; padding: 1rem; background: #f8f9fa; border-radius: 6px; }
        .label { font-weight: 600; display: block; margin-bottom: 0.25rem; color: #333; }
        ul { margin: 0.25rem 0 0.5rem 1.25rem; }
        img { max-width: 150px; height: auto; margin: 0.25rem; border: 1px solid #ddd; border-radius: 4px; }
        .empty { color: #666; font-style: italic; }
    </style>
</head>
<body>
    <h1>Вывод полей IExampleContext</h1>

    <!-- 1. Простое число -->
    <div class="block">
        <span class="label">Число (int):</span>
        <span th:text="${example.number}">0</span>
    </div>

    <!-- 2. Список чисел -->
    <div class="block">
        <span class="label">Список чисел (List&lt;Integer&gt;):</span>
        <ul th:if="${example.numbers != null and !example.numbers.empty}">
            <li th:each="num : ${example.numbers}" th:text="${num}"></li>
        </ul>
        <span th:unless="${example.numbers != null and !example.numbers.empty}" class="empty">Список пуст</span>
    </div>

    <!-- 3. Простая строка -->
    <div class="block">
        <span class="label">Текст (String):</span>
        <span th:text="${example.textString}">Текст не передан</span>
    </div>

    <!-- 4. Список строк -->
    <div class="block">
        <span class="label">Список текстов (List&lt;String&gt;):</span>
        <ul th:if="${example.textStrings != null and !example.textStrings.empty}">
            <li th:each="txt : ${example.textStrings}" th:text="${txt}"></li>
        </ul>
        <span th:unless="${example.textStrings != null and !example.textStrings.empty}" class="empty">Список пуст</span>
    </div>

    <!-- 5. Одиночное изображение (URL) -->
    <div class="block">
        <span class="label">Изображение (String URL):</span><br>
        <img th:src="${example.picture}" 
             th:alt="'Фото: ' + ${example.picture}" 
             th:if="${example.picture != null}" />
        <span th:unless="${example.picture != null}" class="empty">Нет изображения</span>
    </div>

    <!-- 6. Список изображений (URL) -->
    <div class="block">
        <span class="label">Список изображений (List&lt;String&gt; URLs):</span><br>
        <div th:if="${example.pictures != null and !example.pictures.empty}">
            <img th:each="pic : ${example.pictures}"
                 th:src="${pic}" 
                 th:alt="'Фото: ' + ${pic}" />
        </div>
        <span th:unless="${example.pictures != null and !example.pictures.empty}" class="empty">Нет изображений</span>
    </div>
</body>
</html>
