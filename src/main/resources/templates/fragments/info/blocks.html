<div th:fragment="about" class="data-block-odd about-block">
    <div class="logo-name">
        <img th:src="${info.aboutBlock.logo != null ? info.aboutBlock.logo : '/images/placeholder.png'}" alt="Логотип студии «Фокус»" />
        <p>ФОТОСТУДИЯ «ФОКУС»</p>
    </div>
    <div th:text="${info.aboutBlock.description}" class="about-description"></div>
</div>

<div th:fragment="rent-rules" class="data-block-even rent-rules-block carousel-instance">
    <p>ПРАВИЛА АРЕНДЫ</p>
    
    <div class="carousel-wrapper">
        <button type="button" class="carousel-btn carousel-btn--prev">Назад</button>
        <div class="carousel-viewport">
            <div class="carousel">
                <div class="text-card" th:each="rule: ${info.rentRules}">
                    <h3 class="text-card-title" th:text="${rule.title}">Заголовок</h3>
                    <p class="text-card-text" th:text="${rule.text}">Текст</p>
                </div>
            </div>
        </div>
        <button type="button" class="carousel-btn carousel-btn--next">Вперёд</button>
    </div>
</div>

<div th:fragment="imaged-router" class="data-block-odd imaged-router-block">
    <nav class="tabs-nav" role="tablist">
        <button class="tab-btn active" data-tab="halls-tab" role="tab" aria-selected="true">ЗАЛЫ</button>
        <button class="tab-btn" data-tab="equipment-tab" role="tab" aria-selected="false">ОБОРУДОВАНИЕ</button>
        <button class="tab-btn" data-tab="photographers-tab" role="tab" aria-selected="false">ФОТОГРАФЫ</button>
    </nav>

    <div class="tabs-content">
        <div class="tab-panel active" id="halls-tab" role="tabpanel">
            <div class="item-card">
                <img th:src="${info.aboutBlock.logo != null ? info.aboutBlock.logo : '/images/placeholder.png'}" alt="Логотип студии «Фокус»" />
                
                <div class="item-info">
                    <h2>ЗАЛ 1</h2>
                    <p>Описание зала 1</p>
                    <a th:href="@{/photorooms}" class="btn-go">ПЕРЕЙТИ</a>
                </div>
            </div>
        </div>

        <div class="tab-panel" id="equipment-tab" role="tabpanel">
            <div class="item-card">
                <img th:src="${info.aboutBlock.logo != null ? info.aboutBlock.logo : '/images/placeholder.png'}" alt="Логотип студии «Фокус»" />
                
                <div class="item-info">
                    <h2>ОБОРУДОВАНИЕ</h2>
                    <p>Описание зала 1</p>
                    <a th:href="@{/equipment}" class="btn-go">ПЕРЕЙТИ</a>
                </div>
            </div>
        </div>

        <div class="tab-panel" id="photographers-tab" role="tabpanel">
            <div class="item-card">
                <img th:src="${info.aboutBlock.logo != null ? info.aboutBlock.logo : '/images/placeholder.png'}" alt="Логотип студии «Фокус»" />
                
                <div class="item-info">
                    <h2>ФОТОГРАФЫ</h2>
                    <p>Описание зала 1</p>
                    <a th:href="@{/photographers}" class="btn-go">ПЕРЕЙТИ</a>
                </div>
            </div>
        </div>
    </div>
</div>
