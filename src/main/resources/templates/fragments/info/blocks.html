<div th:fragment="about" class="data-block-odd about-block">
    <div class="logo-name">
        <img th:src="${info.aboutBlock.logo != null ? info.aboutBlock.logo : '/images/placeholder.png'}" alt="Логотип студии «Фокус»" />
        <p>ФОТОСТУДИЯ «ФОКУС»</p>
    </div>
    <div th:text="${info.aboutBlock.description}" class="about-description"></div>
</div>

<div th:fragment="rent-rules" class="data-block-even rent-rules-block carousel-instance">
    <p>ПРАВИЛА АРЕНДЫ</p>
    
    <div class="carousel-wrapper">
        <button type="button" class="carousel-btn carousel-btn--prev">Назад</button>
        <div class="carousel-viewport">
            <div class="carousel">
                <div class="text-card" th:each="rule: ${info.rentRules}">
                    <h3 class="text-card-title" th:text="${rule.title}">Заголовок</h3>
                    <p class="text-card-text" th:text="${rule.text}">Текст</p>
                </div>
            </div>
        </div>
        <button type="button" class="carousel-btn carousel-btn--next">Вперёд</button>
    </div>
</div>

<div th:fragment="imaged-router" class="data-block-odd imaged-router-block">
    <nav class="tabs-nav" role="tablist">
        <button th:each="tab, iterStat : ${info.imagedTabs}"
                class="tab-btn"
                th:classappend="${iterStat.first} ? 'active'"
                th:data-tab="${#strings.toLowerCase(tab.tabName)}"
                th:aria-selected="${iterStat.first} ? 'true' : 'false'"
                th:text="${tab.tabName}"
                type="button">
        </button>
    </nav>

    <div class="tabs-content">
        <div th:each="tab, iterStat : ${info.imagedTabs}"
             class="tab-panel"
             th:id="${#strings.toLowerCase(tab.tabName)}"
             th:classappend="${iterStat.first} ? 'active'"
             role="tabpanel">

            <div class="item-card">
                <img th:if="${tab.imageUrl != null}"
                        th:src="${tab.imageUrl}"
                        th:alt="${tab.title}"
                        loading="lazy"/>
                <img th:unless="${tab.imageUrl != null}"
                        src="/images/placeholder.png"
                        alt="Изображение недоступно"
                        loading="lazy"/>
                
                <div class="item-info">
                    <h2 th:text="${tab.title}">ЗАГОЛОВОК ВКЛАДКИ</h2>
                    <p th:text="${tab.text}">Описание вкладки...</p>
                    <a th:href="${tab.linkUrl}" class="btn-go">ПЕРЕЙТИ</a>
                </div>
            </div>
        </div>
    </div>
</div>
